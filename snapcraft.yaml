name: floaties
title: Floaties
license: MIT
base: core24
version: '1.0.0'
summary: A secure and minimalist sticky note application.
description: |
  Floaties provides secure, encrypted, floating sticky notes for your desktop.
  Features built-in atomic database storage, easy migration across Linux and Windows PCs, and a minimalist UI.

contact: mailto:azil@tuta.io
website: https://github.com/azil-74/floaties
issues: https://github.com/azil-74/floaties/issues
source-code: https://github.com/azil-74/floaties
donation: https://therealazil.gumroad.com/l/vdsqh

grade: stable
confinement: strict

platforms:
  amd64:

apps:
  floaties:
    command: bin/python3 $SNAP/main.py
    extensions: [gnome]
    environment:
      QT_QPA_PLATFORM: xcb
      QT_AUTO_SCREEN_SCALE_FACTOR: '1'
    plugs:
      - home
      - network
      - opengl
      - desktop
      - desktop-legacy
      - x11
      - wayland

parts:
  python-env:
    plugin: python
    source: .
    python-packages:
      - PyQt6
      - cryptography
    stage-packages:
      - libxcb-cursor0
      - libfontconfig1
      - libx11-6
      - libsqlite3-0
      - libxkbcommon-x11-0
      - libegl1

  app-code:
    plugin: dump
    source: .
