name: "🐞 Bug Report"
description: "Report something that isn't working correctly in Floaties."
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug! Please fill out the details below."
  - type: textarea
    id: description
    attributes:
      label: "What happened?"
      description: "A clear and concise description of what the bug is."
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - Ubuntu (Snap)
        - Windows
        - Other Linux Distro
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "1. Open Floaties, 2. Click X, 3. See Error..."
    validations:
      required: true